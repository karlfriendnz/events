              - heading "Accessibility" [level=2] [ref=e5095]
              - generic [ref=e5096]:
                - heading "Screen Reader" [level=3] [ref=e5097]
                - paragraph [ref=e5098]: DataTable uses a table element whose attributes can be extended with the tableProps option. This property allows passing aria roles and attributes like aria-label and aria-describedby to define the table for readers. Default role of the table is table. Header, body and footer elements use rowgroup, rows use row role, header cells have columnheader and body cells use cell roles. Sortable headers utilizer aria-sort attribute either set to "ascending" or "descending".
                - paragraph [ref=e5099]:
                  - text: Built-in checkbox and radiobutton components for row selection use checkbox and radiobutton. The label to describe them is retrieved from the aria.selectRow and aria.unselectRow properties of the
                  - link "locale" [ref=e5100] [cursor=pointer]:
                    - /url: /configuration/#locale
                  - text: API. Similarly header checkbox uses selectAll and unselectAll keys. When a row is selected, aria-selected is set to true on a row.
                - paragraph [ref=e5101]:
                  - text: The element to expand or collapse a row is a button with aria-expanded and aria-controls properties. Value to describe the buttons is derived from aria.expandRow and aria.collapseRow properties of the
                  - link "locale" [ref=e5102] [cursor=pointer]:
                    - /url: /configuration/#locale
                  - text: API.
                - paragraph [ref=e5103]: The filter menu button use aria.showFilterMenu and aria.hideFilterMenu properties as aria-label in addition to the aria-haspopup, aria-expanded and aria-controls to define the relation between the button and the overlay. Popop menu has dialog role with aria-modal as focus is kept within the overlay. The operator dropdown use aria.filterOperator and filter constraints dropdown use aria.filterConstraint properties. Buttons to add rules on the other hand utilize aria.addRule and aria.removeRule properties. The footer buttons similarly use aria.clear and aria.apply properties. filterInputProps of the Column component can be used to define aria labels for the built-in filter components, if a custom component is used with templating you also may define your own aria labels as well.
                - paragraph [ref=e5104]: Editable cells use custom templating so you need to manage aria roles and attributes manually if required. The row editor controls are button elements with aria.editRow, aria.cancelEdit and aria.saveEdit used for the aria-label.
                - paragraph [ref=e5105]:
                  - text: Paginator is a standalone component used inside the DataTable, refer to the
                  - link "paginator" [ref=e5106] [cursor=pointer]:
                    - /url: /paginator/
                  - text: for more information about the accessibility features.
                - heading "Keyboard Support" [level=3] [ref=e5107]
                - paragraph [ref=e5108]: Any button element inside the DataTable used for cases like filter, row expansion, edit are tabbable and can be used with space and enter keys.
                - heading "Sortable Headers Keyboard Support" [level=3] [ref=e5109]
                - table [ref=e5111]:
                  - rowgroup [ref=e5112]:
                    - row "Key Function" [ref=e5113]:
                      - columnheader "Key" [ref=e5114]
                      - columnheader "Function" [ref=e5115]
                  - rowgroup [ref=e5116]:
                    - row "tab Moves through the headers." [ref=e5117]:
                      - cell "tab" [ref=e5118]
                      - cell "Moves through the headers." [ref=e5119]
                    - row "enter Sorts the column." [ref=e5120]:
                      - cell "enter" [ref=e5121]
                      - cell "Sorts the column." [ref=e5122]
                    - row "space Sorts the column." [ref=e5123]:
                      - cell "space" [ref=e5124]
                      - cell "Sorts the column." [ref=e5125]
                - heading "Filter Menu Keyboard Support" [level=3] [ref=e5126]
                - table [ref=e5128]:
                  - rowgroup [ref=e5129]:
                    - row "Key Function" [ref=e5130]:
                      - columnheader "Key" [ref=e5131]
